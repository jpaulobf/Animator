# Game State Machine Configuration
# Enable or disable specific screens in the game flow

[GameFlow]
# DEV_LOGO_SCREEN - Shows the developer logo at startup
# If disabled, game starts at SUB_INTRO_SCREEN
dev_logo_enabled=true

# INTRO_SCREEN - Shows the game intro
# If disabled, skips to HIGH_SCORE_SCREEN (if enabled) or SUB_INTRO_SCREEN
intro_screen_enabled=true

# HIGH_SCORE_SCREEN - Shows the high score presentation
# If disabled, loops back to SUB_INTRO_SCREEN
# SUB_INTRO_SCREEN is always required
high_score_screen_enabled=true
